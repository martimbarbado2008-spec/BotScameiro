<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesca Rápida — Trabalho do Casino</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --mint: #57F287;
    --bubble: #6FB8D9;
    --sun: #FACA2B;
    --ruby: #ED4245;
    --charcoal: #e5f3eb;
    --border-glow: rgba(250, 202, 43, 0.2);
    --panel-bg: rgba(18, 38, 29, 0.45);
    --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Outfit', sans-serif;
    background: linear-gradient(135deg, #09130e 0%, #0d1e16 100%);
    color: var(--charcoal);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }
  header {
    width: 100%;
    max-width: 420px;
    text-align: center;
    margin-bottom: 20px;
  }
  .eyebrow {
    display: inline-block;
    background: var(--panel-bg);
    border: 1px solid var(--border-glow);
    color: var(--sun);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 999px;
    margin-bottom: 12px;
  }
  h1 { font-size: 24px; color: var(--charcoal); margin: 0 0 6px; font-weight: 800; }
  header p { font-size: 13px; color: #8ead9e; margin: 0; line-height: 1.4; }
  
  .hud { display: flex; gap: 12px; margin-bottom: 20px; justify-content: center; width: 100%; max-width: 380px; }
  .hud-card {
    background: var(--panel-bg);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 14px;
    padding: 12px 20px;
    box-shadow: var(--shadow);
    text-align: center;
    flex: 1;
  }
  .hud-card .label { font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: #8ead9e; font-weight: 700; }
  .hud-card .value { font-size: 22px; color: var(--sun); font-weight: 800; margin-top: 4px; }
  
  .game-frame {
    background: var(--panel-bg);
    border: 1px solid var(--border-glow);
    border-radius: 24px;
    padding: 24px;
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .water-box {
    width: 100%;
    height: 140px;
    background: rgba(111, 184, 217, 0.05);
    border: 1px dashed rgba(111, 184, 217, 0.2);
    border-radius: 16px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .fish-anim {
    font-size: 48px;
    position: absolute;
    transition: transform 0.1s ease;
  }

  .fishing-bar-container {
    width: 100%;
    margin-bottom: 24px;
  }

  .fishing-track {
    width: 100%;
    height: 24px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    position: relative;
    overflow: hidden;
  }

  .green-zone {
    position: absolute;
    height: 100%;
    background: rgba(87, 242, 135, 0.3);
    border-left: 2px solid var(--mint);
    border-right: 2px solid var(--mint);
    width: 25%;
    left: 37.5%;
    box-shadow: 0 0 10px rgba(87, 242, 135, 0.2);
    transition: all 0.3s ease;
  }

  .marker {
    position: absolute;
    width: 8px;
    height: 100%;
    background: #fff;
    left: 0%;
    transform: translateX(-50%);
    box-shadow: 0 0 8px #fff;
    border-radius: 99px;
  }

  .btn-action {
    width: 100%;
    background: linear-gradient(135deg, var(--bubble), #438ba6);
    border: none;
    color: #09130e;
    font-weight: 800;
    font-size: 16px;
    text-transform: uppercase;
    padding: 14px;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(111, 184, 217, 0.3);
    transition: all 0.15s ease;
  }

  .btn-action:active {
    transform: scale(0.98);
  }

  .btn-action:disabled {
    background: rgba(255,255,255,0.05);
    color: #555;
    cursor: not-allowed;
    box-shadow: none;
  }
  
  .result {
    display: none;
    text-align: center;
    margin-top: 18px;
    background: var(--panel-bg);
    border: 1px solid var(--border-glow);
    color: var(--charcoal);
    border-radius: 18px;
    padding: 20px;
    max-width: 380px;
    width: 100%;
    box-shadow: var(--shadow);
  }
  .result.show { display: block; }
  .result h2 { margin: 0 0 8px; color: var(--sun); font-size: 20px; font-weight: 800; }
  .result p { margin: 0; font-size: 13px; color: #8ead9e; line-height: 1.4; }
  
  .btn-back {
    display: inline-block;
    margin-top: 14px;
    background: linear-gradient(135deg, var(--sun), #b08915);
    border: none;
    color: #09130e;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    text-transform: uppercase;
    text-decoration: none;
  }

  .fish-stats {
    width: 100%;
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-muted);
  }
  
  .note { max-width: 380px; font-size: 11px; color: #5c6f61; text-align: center; margin-top: 16px; line-height: 1.6; }
</style>
</head>
<body>

<header>
  <span class="eyebrow">Pesca Rápida</span>
  <h1>Apanha 3 Peixes Raros!</h1>
  <p>Clica em 🎣 **PUXAR!** quando o indicador estiver sobre a zona verde. Tens direito a 3 falhas.</p>
</header>

<div class="hud">
  <div class="hud-card"><div class="label">Apanhados</div><div class="value" id="caughtValue">0/3</div></div>
  <div class="hud-card"><div class="label">Tentativas Restantes</div><div class="value" id="attemptsValue">3</div></div>
</div>

<div class="game-frame" id="gameFrame">
  <div class="water-box">
    <div class="fish-anim" id="fishIcon">🐟</div>
  </div>

  <div class="fishing-bar-container">
    <div class="fishing-track">
      <div class="green-zone" id="greenZone"></div>
      <div class="marker" id="marker"></div>
    </div>
    <div class="fish-stats">
      <span>Velocidade: <span id="speedVal">1x</span></span>
      <span>Tamanho Zona: <span id="zoneVal">25%</span></span>
    </div>
  </div>

  <button class="btn-action" id="btnAction" onclick="pullAnzol()">🎣 Puxar!</button>
</div>

<div class="result" id="result">
  <h2 id="resultTitle">A processar...</h2>
  <p id="resultText"></p>
  <a href="/dashboard.html" class="btn-back" id="btnBack">Voltar ao Painel</a>
</div>

<p class="note">Não saias desta página até veres o resultado guardado.</p>

<script>
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    if (type === 'hit') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.15);
    } else if (type === 'miss') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(250, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(150, audioCtx.currentTime + 0.25);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.25);
    } else if (type === 'win') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
      osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.08); // E5
      osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.16); // G5
      osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.24); // C6
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.5);
    } else if (type === 'lose') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(120, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(60, audioCtx.currentTime + 0.6);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.6);
    }
  }

  const urlParams = new URLSearchParams(window.location.search);
  const JOB_TOKEN = urlParams.get('jobToken');

  let caught = 0;
  let attempts = 3;
  let finished = false;

  // Parâmetros do slider
  let position = 0;
  let direction = 1;
  let baseSpeed = 1.6; // velocidade base
  let speedMultiplier = 1.0;
  let greenZoneWidth = 25; // em percentagem
  let greenZoneLeft = 37.5; // posição inicial
  let loopInterval = null;

  const marker = document.getElementById('marker');
  const greenZone = document.getElementById('greenZone');
  const fishIcon = document.getElementById('fishIcon');
  const caughtValueEl = document.getElementById('caughtValue');
  const attemptsValueEl = document.getElementById('attemptsValue');
  const speedValEl = document.getElementById('speedVal');
  const zoneValEl = document.getElementById('zoneVal');
  const btnAction = document.getElementById('btnAction');
  const gameFrame = document.getElementById('gameFrame');
  const resultBox = document.getElementById('result');
  const resultTitle = document.getElementById('resultTitle');
  const resultText = document.getElementById('resultText');

  // Faz peixe flutuar
  let fishFloatTime = 0;
  function floatFish() {
    if (finished) return;
    fishFloatTime += 0.05;
    const y = Math.sin(fishFloatTime) * 12;
    const scale = direction > 0 ? 1 : -1;
    fishIcon.style.transform = `translateY(${y}px) scaleX(${scale})`;
    requestAnimationFrame(floatFish);
  }
  floatFish();

  function updateGameDifficulty() {
    // Aumenta velocidade e encolhe zona verde com os acertos
    speedMultiplier = 1.0 + (caught * 0.4);
    greenZoneWidth = Math.max(12, 25 - (caught * 4));
    greenZoneLeft = Math.floor(Math.random() * (95 - greenZoneWidth - 5)) + 5;

    greenZone.style.width = greenZoneWidth + '%';
    greenZone.style.left = greenZoneLeft + '%';
    speedValEl.textContent = speedMultiplier.toFixed(1) + 'x';
    zoneValEl.textContent = greenZoneWidth + '%';
  }

  function startMarkerLoop() {
    loopInterval = setInterval(() => {
      if (finished) return;
      position += baseSpeed * speedMultiplier * direction;
      if (position >= 100) {
        position = 100;
        direction = -1;
      } else if (position <= 0) {
        position = 0;
        direction = 1;
      }
      marker.style.left = position + '%';
    }, 15);
  }

  function pullAnzol() {
    if (finished) return;
    
    // Verifica se está dentro da zona verde
    const minLimit = greenZoneLeft;
    const maxLimit = greenZoneLeft + greenZoneWidth;
    const isHit = position >= minLimit && position <= maxLimit;

    btnAction.disabled = true;
    setTimeout(() => { if (!finished) btnAction.disabled = false; }, 400);

    if (isHit) {
      playSound('hit');
      caught++;
      caughtValueEl.textContent = `${caught}/3`;
      fishIcon.textContent = ['🐠', '🐡', '🐙', '🦑'][Math.floor(Math.random() * 4)];
      
      // Animação de sucesso no ecrã de água
      document.querySelector('.water-box').style.background = 'rgba(87, 242, 135, 0.15)';
      setTimeout(() => {
        document.querySelector('.water-box').style.background = 'rgba(111, 184, 217, 0.05)';
        fishIcon.textContent = '🐟';
      }, 500);

      if (caught >= 3) {
        finish();
      } else {
        updateGameDifficulty();
      }
    } else {
      playSound('miss');
      attempts--;
      attemptsValueEl.textContent = attempts;
      
      // Animação de erro no ecrã de água
      document.querySelector('.water-box').style.background = 'rgba(237, 66, 69, 0.15)';
      setTimeout(() => {
        document.querySelector('.water-box').style.background = 'rgba(111, 184, 217, 0.05)';
      }, 500);

      if (attempts <= 0) {
        finish();
      }
    }
  }

  async function finish() {
    finished = true;
    clearInterval(loopInterval);
    btnAction.disabled = true;
    gameFrame.style.opacity = '0.4';
    resultBox.style.display = 'block';
    resultTitle.textContent = 'A processar...';
    resultText.textContent = '';

    try {
      const res = await fetch('/api/jobs/complete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jobToken: JOB_TOKEN, score: caught })
      });
      const data = await res.json();
      
      if (!res.ok) {
        playSound('lose');
        resultTitle.textContent = 'Ups!';
        resultText.textContent = data.error || 'Erro ao processar as recompensas.';
      } else {
        if (data.reward > 0) {
          playSound('win');
          resultTitle.textContent = 'Pescaria de Sucesso!';
          resultText.textContent = `Apanhaste **${caught}/3** peixes e foste pago com **${data.reward} moedas**!`;
        } else {
          playSound('lose');
          resultTitle.textContent = 'Fuga Total!';
          resultText.textContent = 'Os peixes fugiram todos. Recebeste 0 moedas desta vez. Tenta novamente!';
        }
      }
    } catch (err) {
      playSound('lose');
      resultTitle.textContent = 'Erro!';
      resultText.textContent = 'Erro ao contactar o servidor.';
    }
  }

  updateGameDifficulty();
  startMarkerLoop();
</script>
  <script src="/music.js"></script>
</body>
</html>
