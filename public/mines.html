<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mines — Campo Minado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #09130e 0%, #0d1e16 50%, #050b08 100%);
      --gold: #FACA2B;
      --mint: #57F287;
      --ruby: #FF3366;
      --panel-bg: rgba(18, 38, 29, 0.45);
      --border-glow: rgba(87, 242, 135, 0.15);
      --text: #E5F3EB;
      --text-muted: #8fa096;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-gradient);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
    }

    .container {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      padding: 15px 24px;
      border-radius: 16px;
      border: 1px solid var(--border-glow);
    }

    .btn-back {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 700;
      text-decoration: none;
      font-size: 13px;
      transition: all 0.2s;
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateX(-3px);
    }

    .game-grid-container {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 20px;
    }

    @media (max-width: 600px) {
      .game-grid-container {
        grid-template-columns: 1fr;
      }
    }

    .control-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-glow);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 11px;
      font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-field {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 10px 12px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-field:focus {
      border-color: var(--mint);
    }

    .btn-play {
      background: linear-gradient(135deg, var(--mint), #38d068);
      color: #050e08;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 4px 15px rgba(87, 242, 135, 0.2);
      transition: all 0.2s;
    }

    .btn-play:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(87, 242, 135, 0.35);
    }

    .btn-cashout {
      background: linear-gradient(135deg, var(--gold), #f39c12);
      color: #000;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 4px 15px rgba(250, 202, 43, 0.2);
      transition: all 0.2s;
      display: none;
    }

    .btn-cashout:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(250, 202, 43, 0.4);
    }

    .board-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-glow);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 380px;
      aspect-ratio: 1;
    }

    .cell {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .cell:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: scale(1.05);
      border-color: rgba(255,255,255,0.2);
    }

    .cell.revealed-diamond {
      background: rgba(87, 242, 135, 0.15);
      border-color: var(--mint);
      box-shadow: 0 0 10px rgba(87, 242, 135, 0.15);
      transform: scale(1);
      cursor: default;
    }

    .cell.revealed-mine {
      background: rgba(255, 51, 102, 0.2);
      border-color: var(--ruby);
      box-shadow: 0 0 15px rgba(255, 51, 102, 0.3);
      animation: explode 0.5s ease;
      cursor: default;
    }

    @keyframes explode {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .cell.disabled {
      cursor: default;
      pointer-events: none;
      opacity: 0.5;
    }

    .status-hud {
      display: flex;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .status-hud span {
      color: var(--gold);
    }

    #unauthScreen {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: #09130e;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    #unauthScreen h2 {
      margin-bottom: 10px;
      color: var(--ruby);
    }
  </style>
</head>
<body>

  <!-- Ecrã de erro de login -->
  <div id="unauthScreen" style="display: none;">
    <h2>🔒 Sessão Expirada ou Inválida</h2>
    <p>Tens de aceder ao site através do link gerado no Discord.</p>
    <p style="margin-top: 10px; color: var(--text-muted);">Volta ao teu servidor e clica em <strong>Entrar no Casino Web 🌐</strong></p>
  </div>

  <div class="container" id="gameApp">
    <header>
      <div>
        <h1 style="font-size: 20px; font-weight: 900; color: var(--gold);">💣 CAMPO MINADO</h1>
        <p style="font-size: 12px; color: var(--text-muted);">Revela gemas e saca antes de explodir</p>
      </div>
      <a href="/dashboard.html" class="btn-back">⬅️ Voltar à Dashboard</a>
    </header>

    <div class="status-hud">
      <div>Carteira: <span id="userBalance">... 🪙</span></div>
      <div>Multiplicador: <span id="currentMult">x1.00</span></div>
    </div>

    <div class="game-grid-container">
      <!-- Controls -->
      <div class="control-panel">
        <div class="form-group">
          <label class="form-label">Aposta (🪙)</label>
          <input type="number" id="minesBet" class="input-field" value="100" min="1">
        </div>

        <div class="form-group">
          <label class="form-label">Minas (1-15)</label>
          <input type="number" id="minesCount" class="input-field" value="3" min="1" max="15">
        </div>

        <button id="btnPlay" class="btn-play" onclick="startGame()">Começar Jogo 💣</button>
        <button id="btnCashout" class="btn-cashout" onclick="cashout()">Sacar Prémio 💰</button>

        <div id="resultBox" style="font-size: 13px; font-weight: 600; text-align: center; margin-top: 10px;"></div>
      </div>

      <!-- Board -->
      <div class="board-panel">
        <div class="grid" id="minesGrid">
          <!-- 20 cells will be injected dynamically -->
        </div>
      </div>
    </div>
  </div>

  <script>
    let inProgress = false;
    let selectedCells = new Set();
    
    // Sobrecarga do fetch global para incluir o token de autorização automaticamente
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const tokenParam = urlParams.get('token');
      if (tokenParam) {
        localStorage.setItem('token', tokenParam);
      }
      
      const originalFetch = window.fetch;
      window.fetch = function (url, options = {}) {
        const token = new URLSearchParams(window.location.search).get('token') || localStorage.getItem('token');
        if (token) {
          if (!options.headers) options.headers = {};
          if (options.headers instanceof Headers) {
            options.headers.set('Authorization', `Bearer ${token}`);
          } else if (Array.isArray(options.headers)) {
            if (!options.headers.some(h => h[0].toLowerCase() === 'authorization')) {
              options.headers.push(['Authorization', `Bearer ${token}`]);
            }
          } else {
            if (!options.headers['Authorization'] && !options.headers['authorization']) {
              options.headers['Authorization'] = `Bearer ${token}`;
            }
          }
        }
        return originalFetch(url, options);
      };
    })();

    async function checkAuth() {
      try {
        const res = await fetch('/api/dashboard/data');
        if (!res.ok) throw new Error();
        const data = await res.json();
        document.getElementById('userBalance').textContent = Math.round(data.balance).toLocaleString('pt-PT') + ' 🪙';
        document.getElementById('gameApp').style.display = 'flex';
        
        // Sincronizar links
        const token = new URLSearchParams(window.location.search).get('token') || localStorage.getItem('token');
        if (token) {
          document.querySelectorAll('a').forEach(a => {
            if (a.href && (a.href.includes('.html') || a.href.startsWith('/'))) {
              try {
                const u = new URL(a.href, window.location.origin);
                u.searchParams.set('token', token);
                a.href = u.pathname + u.search;
              } catch(e) {}
            }
          });
        }
      } catch (err) {
        document.getElementById('unauthScreen').style.display = 'flex';
        document.getElementById('gameApp').style.display = 'none';
      }
    }

    function initGrid() {
      const grid = document.getElementById('minesGrid');
      grid.innerHTML = '';
      selectedCells.clear();
      
      for (let i = 0; i < 20; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell disabled';
        cell.dataset.index = i;
        cell.textContent = '❓';
        cell.onclick = () => revealCell(i);
        grid.appendChild(cell);
      }
    }

    async function startGame() {
      const betInput = document.getElementById('minesBet');
      const countInput = document.getElementById('minesCount');
      const resultBox = document.getElementById('resultBox');
      
      const bet = parseInt(betInput.value, 10);
      const minesCount = parseInt(countInput.value, 10);
      
      if (isNaN(bet) || bet <= 0) {
        alert('Aposta inválida.');
        return;
      }
      if (isNaN(minesCount) || minesCount < 1 || minesCount > 15) {
        alert('As minas devem ser entre 1 e 15.');
        return;
      }
      
      resultBox.textContent = '';
      
      try {
        const res = await fetch('/api/games/mines/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ bet, minesCount })
        });
        
        const data = await res.json();
        if (!res.ok) {
          alert(data.error || 'Erro ao iniciar o jogo.');
          return;
        }
        
        initGrid();
        
        inProgress = true;
        document.getElementById('userBalance').textContent = Math.round(data.newBalance).toLocaleString('pt-PT') + ' 🪙';
        document.getElementById('currentMult').textContent = 'x1.00';
        
        // Habilita as células
        document.querySelectorAll('.cell').forEach(c => {
          c.className = 'cell';
        });
        
        betInput.disabled = true;
        countInput.disabled = true;
        document.getElementById('btnPlay').style.display = 'none';
        document.getElementById('btnCashout').style.display = 'block';
        document.getElementById('btnCashout').disabled = true;
        
      } catch (err) {
        alert('Erro de conexão ao servidor.');
      }
    }

    async function revealCell(cellIndex) {
      if (!inProgress || selectedCells.has(cellIndex)) return;
      selectedCells.add(cellIndex);
      
      const cell = document.querySelector(`.cell[data-index="${cellIndex}"]`);
      
      try {
        const res = await fetch('/api/games/mines/reveal', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cellIndex })
        });
        
        const data = await res.json();
        if (!res.ok) {
          alert(data.error || 'Erro ao revelar.');
          selectedCells.delete(cellIndex);
          return;
        }
        
        if (data.exploded) {
          // Explodiu
          cell.className = 'cell revealed-mine';
          cell.textContent = '💣';
          endGame(false, data.grid);
          document.getElementById('resultBox').innerHTML = `<span style="color:var(--ruby);">💥 Explodiste! Perdeste o saldo.</span>`;
          document.getElementById('userBalance').textContent = Math.round(data.newBalance).toLocaleString('pt-PT') + ' 🪙';
        } else {
          // Revelou gema com sucesso
          cell.className = 'cell revealed-diamond';
          cell.textContent = '💎';
          document.getElementById('currentMult').textContent = `x${data.multiplier.toFixed(2)}`;
          document.getElementById('btnCashout').disabled = false;
          
          if (data.cleared) {
            // Limpou todas
            endGame(true);
            document.getElementById('resultBox').innerHTML = `<span style="color:var(--mint);">🏆 Campo Limpo! Ganhaste +${data.winnings.toLocaleString('pt-PT')} 🪙!</span>`;
            document.getElementById('userBalance').textContent = Math.round(data.newBalance).toLocaleString('pt-PT') + ' 🪙';
          }
        }
      } catch (err) {
        alert('Erro ao revelar.');
        selectedCells.delete(cellIndex);
      }
    }

    async function cashout() {
      if (!inProgress) return;
      
      try {
        const res = await fetch('/api/games/mines/cashout', {
          method: 'POST'
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.error || 'Erro ao sacar.');
          return;
        }
        
        endGame(true);
        document.getElementById('resultBox').innerHTML = `<span style="color:var(--mint);">💰 Sacaste x${data.multiplier.toFixed(2)}! Recebeste +${data.winnings.toLocaleString('pt-PT')} 🪙</span>`;
        document.getElementById('userBalance').textContent = Math.round(data.newBalance).toLocaleString('pt-PT') + ' 🪙';
        
      } catch (err) {
        alert('Erro ao sacar.');
      }
    }

    function endGame(won, grid = null) {
      inProgress = false;
      
      document.getElementById('minesBet').disabled = false;
      document.getElementById('minesCount').disabled = false;
      document.getElementById('btnPlay').style.display = 'block';
      document.getElementById('btnCashout').style.display = 'none';
      
      // Revela tudo e desativa
      document.querySelectorAll('.cell').forEach(c => {
        const idx = parseInt(c.dataset.index, 10);
        c.classList.add('disabled');
        if (grid) {
          if (grid[idx] === 'mine') {
            c.textContent = '💣';
            if (!c.classList.contains('revealed-mine')) {
              c.style.background = 'rgba(255, 51, 102, 0.1)';
            }
          } else {
            c.textContent = '💎';
          }
        }
      });
    }

    checkAuth();
    initGrid();
  </script>
</body>
</html>
