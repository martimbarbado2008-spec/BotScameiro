<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cara ou Coroa — Casino</title>
<script src="/utils.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f1c40f;
    --gold-glow: rgba(241, 196, 15, 0.35);
    --pine: #0a0f0d;
    --charcoal: #e5f3eb;
    --panel-bg: rgba(255, 255, 255, 0.03);
    --border: rgba(255, 255, 255, 0.06);
    --win: #2ecc71;
    --lose: #e74c3c;
    --shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Outfit', sans-serif;
    background: radial-gradient(circle at center, #141f19 0%, #0a0f0d 100%);
    color: var(--charcoal);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
  }
  .container {
    width: 100%;
    max-width: 440px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 32px 24px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .container::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #f1c40f, #f39c12);
  }
  .btn-back {
    position: absolute;
    top: 20px; left: 20px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--charcoal);
    border-radius: 50%;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; text-decoration: none;
    font-size: 14px; font-weight: 700;
    transition: all .2s;
  }
  .btn-back:hover { background: rgba(255,255,255,0.12); transform: scale(1.05); }

  h1 { font-size: 26px; font-weight: 800; margin: 20px 0 6px; }
  p.subtitle { font-size: 13px; color: #8ead9e; margin: 0 0 30px; }

  /* Coin 3D Container */
  .coin-container {
    perspective: 1000px;
    width: 140px; height: 140px;
    margin: 0 auto 30px;
  }
  .coin {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.1s;
  }
  .side {
    width: 100%; height: 100%;
    border-radius: 50%;
    position: absolute;
    backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
    font-size: 48px; font-weight: 800;
    box-shadow: 0 0 25px rgba(241, 196, 15, 0.4), inset 0 0 15px rgba(255,255,255,0.3);
    border: 6px solid #d4ac0d;
  }
  .side::before {
    content: '';
    position: absolute;
    top: 6%; left: 6%; right: 6%; bottom: 6%;
    border: 2px dashed rgba(255, 255, 255, 0.35);
    border-radius: 50%;
    pointer-events: none;
  }
  .heads {
    background: radial-gradient(circle at 35% 35%, #fff176 0%, #f1c40f 55%, #9a7d0a 100%);
    color: #4a2c00;
    text-shadow: 0 1.5px 0 rgba(255,255,255,0.4);
  }
  .tails {
    background: radial-gradient(circle at 35% 35%, #ffb74d 0%, #e67e22 55%, #873a00 100%);
    color: #4a1c00;
    text-shadow: 0 1.5px 0 rgba(255,255,255,0.4);
    transform: rotateY(180deg);
  }

  /* Animations */
  @keyframes flipHeads {
    0% { transform: rotateY(0); }
    100% { transform: rotateY(1800deg); }
  }
  @keyframes flipTails {
    0% { transform: rotateY(0); }
    100% { transform: rotateY(1980deg); }
  }
  .spinning-heads { animation: flipHeads 2.2s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
  .spinning-tails { animation: flipTails 2.2s cubic-bezier(0.25, 1, 0.5, 1) forwards; }

  /* Selector Grid */
  .choice-selector {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
    margin-bottom: 24px;
  }
  .choice-btn {
    background: rgba(255,255,255,0.02);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    font-weight: 700;
    font-size: 16px;
    color: var(--charcoal);
    cursor: pointer;
    transition: all .2s;
  }
  .choice-btn.selected {
    border-color: var(--gold);
    background: rgba(241, 196, 15, 0.1);
    box-shadow: 0 0 15px var(--border-glow);
    transform: translateY(-2px);
  }
  .choice-btn:hover:not(.selected) {
    background: rgba(255,255,255,0.05);
    border-color: rgba(255,255,255,0.12);
  }

  /* Bet Area */
  .bet-wrapper {
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .bet-input-container { flex: 1; text-align: left; }
  .bet-input-container label { font-size: 10px; color: #8ead9e; font-weight: 700; text-transform: uppercase; }
  .bet-input-container input {
    width: 100%; background: transparent; border: none; outline: none;
    color: #fff; font-size: 18px; font-weight: 700; margin-top: 4px;
  }
  .bet-shortcuts { display: flex; gap: 6px; }
  .shortcut-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--charcoal);
    padding: 6px 10px;
    font-size: 11px; font-weight: 700;
    cursor: pointer;
    transition: all .15s;
  }
  .shortcut-btn:hover { background: rgba(255,255,255,0.1); }

  .action-btn {
    width: 100%;
    background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%);
    border: none; outline: none;
    color: #000; font-size: 16px; font-weight: 800;
    padding: 18px; border-radius: 16px;
    cursor: pointer;
    transition: all .2s;
    box-shadow: 0 6px 20px var(--gold-glow);
  }
  .action-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 25px var(--gold-glow); }
  .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Result Badge */
  .result-banner {
    display: none;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px;
    margin-top: 24px;
    animation: fadeIn .3s ease forwards;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .result-banner.win { border-color: rgba(46, 204, 113, 0.4); background: rgba(46, 204, 113, 0.05); }
  .result-banner.lose { border-color: rgba(231, 76, 60, 0.4); background: rgba(231, 76, 60, 0.05); }
  .result-title { font-size: 16px; font-weight: 800; margin: 0 0 4px; }
  .result-desc { font-size: 12px; color: #8ead9e; }
  
  .hud-balance { font-size: 12px; color: #8ead9e; margin-bottom: 24px; font-weight: 600; }
  .hud-balance span { color: var(--gold); }
</style>
</head>
<body>

<div class="container">
  <a href="/jogos.html" class="btn-back">⬅</a>
  
  <h1>Cara ou Coroa</h1>
  <p class="subtitle">Aposta na moeda física e dobra o teu saldo</p>

  <div class="hud-balance">Saldo da Carteira: <span id="balanceDisplay">A carregar...</span> 🪙</div>

  <div class="coin-container">
    <div class="coin" id="coin">
      <div class="side heads">🪙</div>
      <div class="side tails">👑</div>
    </div>
  </div>

  <div class="choice-selector">
    <button class="choice-btn selected" id="btn-cara" onclick="selectSide('cara')">🪙 CARA</button>
    <button class="choice-btn" id="btn-coroa" onclick="selectSide('coroa')">👑 COROA</button>
  </div>

  <div class="bet-wrapper">
    <div class="bet-input-container">
      <label>Valor da Aposta</label>
      <input type="number" id="betInput" value="100" min="10">
    </div>
    <div class="bet-shortcuts">
      <button class="shortcut-btn" onclick="adjustBet('half')">/2</button>
      <button class="shortcut-btn" onclick="adjustBet('double')">2x</button>
      <button class="shortcut-btn" onclick="adjustBet('max')">MAX</button>
    </div>
  </div>

  <button class="action-btn" id="btnFlip" onclick="flipCoin()">LANÇAR MOEDA</button>

  <div class="result-banner" id="resultBanner">
    <div class="result-title" id="resultTitle">VITÓRIA!</div>
    <div class="result-desc" id="resultDesc">Recebeste +200 moedas e +10 XP.</div>
  </div>
</div>

<script>
  let selectedSide = 'cara';
  let balance = 0;
  let isSpinning = false;
  let minBet = 10;
  let maxBet = 50000;

  async function loadBalance() {
    try {
      const res = await fetch('/api/dashboard/data');
      if (!res.ok) {
        window.location.href = '/login.html';
        return;
      }
      const data = await res.json();
      balance = data.balance;
      minBet = data.minBet || 10;
      maxBet = data.maxBet || 50000;
      document.getElementById('balanceDisplay').textContent = balance.toLocaleString('pt-PT');
    } catch (e) {
      console.error(e);
    }
  }

  function selectSide(side) {
    if (isSpinning) return;
    selectedSide = side;
    document.getElementById('btn-cara').classList.toggle('selected', side === 'cara');
    document.getElementById('btn-coroa').classList.toggle('selected', side === 'coroa');
  }

  function adjustBet(action) {
    if (isSpinning) return;
    const input = document.getElementById('betInput');
    let val = parseInt(input.value, 10) || 0;
    if (action === 'half') val = Math.max(10, Math.floor(val / 2));
    else if (action === 'double') val = Math.min(balance, val * 2);
    else if (action === 'max') val = Math.min(balance, maxBet);
    input.value = val;
  }

  async function flipCoin() {
    if (isSpinning) return;
    
    const betInput = document.getElementById('betInput');
    const bet = parseInt(betInput.value, 10);
    
    if (isNaN(bet) || bet < minBet) {
      alert(`Aposta mínima é de ${minBet} moedas.`);
      return;
    }
    if (bet > balance) {
      alert('Saldo insuficiente.');
      return;
    }

    isSpinning = true;
    document.getElementById('btnFlip').disabled = true;
    document.getElementById('resultBanner').style.display = 'none';

    // Limpa classes anteriores da moeda
    const coin = document.getElementById('coin');
    coin.classList.remove('spinning-heads', 'spinning-tails');
    // Forçar reflow para reiniciar animação CSS
    void coin.offsetWidth;

    try {
      const res = await fetch('/api/games/coinflip', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bet, side: selectedSide })
      });
      const data = await res.json();

      if (!res.ok) {
        alert(data.error || 'Erro ao processar aposta.');
        isSpinning = false;
        document.getElementById('btnFlip').disabled = false;
        return;
      }

      // Adiciona animação sorteada
      const isHeads = data.result === 'cara';
      if (isHeads) {
        coin.classList.add('spinning-heads');
      } else {
        coin.classList.add('spinning-tails');
      }

      setTimeout(() => {
        isSpinning = false;
        document.getElementById('btnFlip').disabled = false;
        
        balance = data.newBalance;
        document.getElementById('balanceDisplay').textContent = balance.toLocaleString('pt-PT');

        const banner = document.getElementById('resultBanner');
        const title = document.getElementById('resultTitle');
        const desc = document.getElementById('resultDesc');
        
        banner.className = `result-banner ${data.won ? 'win' : 'lose'}`;
        title.textContent = data.won ? '🎉 Ganhaste!' : '🚨 Perdeste!';
        title.style.color = data.won ? 'var(--win)' : 'var(--lose)';
        desc.textContent = data.won 
          ? `Sorteado: ${data.result.toUpperCase()}! Recebeste +${data.winnings.toLocaleString('pt-PT')} 🪙!` 
          : `Sorteado: ${data.result.toUpperCase()}! Perdeste ${bet.toLocaleString('pt-PT')} 🪙.`;

        banner.style.display = 'block';
      }, 2200);

    } catch (e) {
      alert('Erro de rede.');
      isSpinning = false;
      document.getElementById('btnFlip').disabled = false;
    }
  }

  window.onload = loadBalance;
</script>
</body>
</html>
